server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: parent-portal-whatsapp
  config:
    # Load root workspace .env as properties when running from spring-whatsapp-backend
    import: optional:file:../.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/parent_chatbot}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  jackson:
    deserialization:
      fail-on-unknown-properties: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.university.parentportal: INFO

whatsapp:
  verify-token: ${WHATSAPP_VERIFY_TOKEN:change-me}
  access-token: ${WHATSAPP_ACCESS_TOKEN:change-me}
  phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:change-me}
  api-version: ${WHATSAPP_API_VERSION:v20.0}
  graph-base-url: ${WHATSAPP_GRAPH_BASE_URL:https://graph.facebook.com}
